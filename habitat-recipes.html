<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>栖息地配方 - 宝可梦游戏攻略</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .pokemon-tag {
            display: inline-block;
            padding: 4px 12px;
            margin: 3px;
            border-radius: 15px;
            font-size: 0.85rem;
            background: #e8f8f8;
            color: #2c3e50;
        }
        
        .pokemon-tag.time-tag {
            background: #fff3cd;
            color: #856404;
        }
        
        .pokemon-tag.weather-tag {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .pokemon-tag.region-tag {
            background: #f8d7da;
            color: #721c24;
        }
        
        .pokemon-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .pokemon-item {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .pokemon-item:hover {
            background: #e9ecef;
            transform: scale(1.05);
        }
        
        .pokemon-item .pokemon-name {
            font-weight: 500;
            color: #2c3e50;
        }
        
        .pokemon-item .pokemon-type {
            font-size: 0.8rem;
            color: #666;
            padding: 2px 8px;
            background: #dee2e6;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">🎮 宝可梦游戏攻略</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索栖息地或宝可梦..." class="search-input">
                <button class="search-btn" onclick="performSearch()">🔍</button>
            </div>
        </div>
    </header>

    <nav class="nav">
        <div class="container">
            <ul class="nav-list">
                <li><a href="index.html" class="nav-link">首页</a></li>
                <li><a href="game-data.html" class="nav-link">宝可梦列表</a></li>
                <li><a href="habitat-recipes.html" class="nav-link active">栖息地配方</a></li>
                <li><a href="gallery.html" class="nav-link">图片展示</a></li>
            </ul>
        </div>
    </nav>

    <main class="main">
        <div class="container">
            <section class="data-section" id="intro">
                <h2>🏠 栖息地配方指南</h2>
                <p>通过摆放不同的家具和装饰品，可以创建各种栖息地，吸引不同类型的宝可梦出现。</p>
            </section>

            <section class="data-section" id="habitats">
                <h2>🌿 栖息地列表</h2>
                <div id="habitatsContainer" class="data-grid"></div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 宝可梦游戏攻略文档 | 本地访问版本</p>
        </div>
    </footer>

    <script src="habitats-data.js"></script>
    <script>
        function renderHabitats() {
            const container = document.getElementById('habitatsContainer');
            
            container.innerHTML = habitatsData.map(habitat => {
                const pokemonHTML = habitat.pokemon.map(p => {
                    const tags = [];
                    if (p.time.length > 0) {
                        tags.push(`<span class="pokemon-tag time-tag">⏰ ${p.time.join(', ')}</span>`);
                    }
                    if (p.weather.length > 0) {
                        tags.push(`<span class="pokemon-tag weather-tag">🌤️ ${p.weather.join(', ')}</span>`);
                    }
                    if (p.region.length > 0) {
                        tags.push(`<span class="pokemon-tag region-tag">🗺️ ${p.region.join(', ')}</span>`);
                    }

                    return `
                        <div class="pokemon-item">
                            <span class="pokemon-name">${p.name}</span>
                            <span class="pokemon-type">${p.type}</span>
                            ${tags.join('')}
                        </div>
                    `;
                }).join('');

                const conditionsHTML = habitat.conditions.map(c => {
                    return `<span class="recipe-item">${c.emoji} ${c.name} x${c.quantity}</span>`;
                }).join('');

                return `
                    <div class="recipe-card">
                        <h3>🏠 ${habitat.name}</h3>
                        <div class="recipe-items">
                            ${conditionsHTML}
                        </div>
                        <div class="pokemon-list">
                            ${pokemonHTML}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (!query) {
                renderHabitats();
                return;
            }
            
            const container = document.getElementById('habitatsContainer');
            const filteredHabitats = habitatsData.filter(habitat => {
                const habitatMatch = habitat.name.toLowerCase().includes(query);
                const pokemonMatch = habitat.pokemon.some(p => 
                    p.name.toLowerCase().includes(query) || 
                    p.type.toLowerCase().includes(query)
                );
                const conditionMatch = habitat.conditions.some(c => 
                    c.name.toLowerCase().includes(query)
                );
                
                return habitatMatch || pokemonMatch || conditionMatch;
            });

            if (filteredHabitats.length === 0) {
                container.innerHTML = '<div class="no-results">没有找到符合条件的栖息地</div>';
                return;
            }

            container.innerHTML = filteredHabitats.map(habitat => {
                const pokemonList = habitat.pokemon.filter(p => {
                    const pokemonMatch = p.name.toLowerCase().includes(query) || 
                                       p.type.toLowerCase().includes(query);
                    return pokemonMatch || query === '';
                });

                if (pokemonList.length === 0) return '';

                const pokemonHTML = pokemonList.map(p => {
                    const tags = [];
                    if (p.time.length > 0) {
                        tags.push(`<span class="pokemon-tag time-tag">⏰ ${p.time.join(', ')}</span>`);
                    }
                    if (p.weather.length > 0) {
                        tags.push(`<span class="pokemon-tag weather-tag">🌤️ ${p.weather.join(', ')}</span>`);
                    }
                    if (p.region.length > 0) {
                        tags.push(`<span class="pokemon-tag region-tag">🗺️ ${p.region.join(', ')}</span>`);
                    }

                    return `
                        <div class="pokemon-item">
                            <span class="pokemon-name">${p.name}</span>
                            <span class="pokemon-type">${p.type}</span>
                            ${tags.join('')}
                        </div>
                    `;
                }).join('');

                const conditionsHTML = habitat.conditions.map(c => {
                    return `<span class="recipe-item">${c.emoji} ${c.name} x${c.quantity}</span>`;
                }).join('');

                return `
                    <div class="recipe-card">
                        <h3>🏠 ${habitat.name}</h3>
                        <div class="recipe-items">
                            ${conditionsHTML}
                        </div>
                        <div class="pokemon-list">
                            ${pokemonHTML}
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderHabitats();

            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        });
    </script>
</body>
</html>
